<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Money Manager</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f4f6f8;
      padding-bottom: 86px;
    }

    .header {
      padding: 18px 18px 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 25px;
    }

    .header p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.4;
    }

    .month-switcher {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 10px;
      align-items: center;
    }

    .month-button,
    .month-label {
      border: none;
      border-radius: 14px;
      background: white;
      height: 44px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      cursor: pointer;
    }

    .month-button {
      font-size: 22px;
    }

    .month-label {
      font-size: 16px;
    }

    .page {
      display: none;
      padding: 10px 18px;
    }

    .page.active {
      display: block;
    }

    .pending-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .pending-card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .pending-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .pending-value {
      font-size: 24px;
      font-weight: bold;
    }

    .pending-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 5px;
    }

    .filter-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0 14px;
    }

    .filter-button {
      border: none;
      border-radius: 14px;
      padding: 12px;
      background: #e5e7eb;
      color: #374151;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .filter-button.active {
      background: #111827;
      color: white;
    }

    .block {
      background: white;
      border-radius: 18px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .block-header {
      padding: 14px 15px;
      border-bottom: 1px solid #eef0f2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .block-title {
      font-size: 16px;
      font-weight: bold;
    }

    .block-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 3px;
    }

    .block-total {
      font-size: 13px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .block-total-sub {
      font-size: 11px;
      color: #6b7280;
      margin-top: 3px;
    }

    .block.income {
      border-left: 5px solid #047857;
    }

    .block.expense {
      border-left: 5px solid #b45309;
    }

    .block.savings {
      border-left: 5px solid #2563eb;
    }

    .block.investment {
      border-left: 5px solid #7c3aed;
    }

    .item {
      padding: 14px 15px;
      border-bottom: 1px solid #eef0f2;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item.completed,
    .item.inactive {
      opacity: 0.62;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-name {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .item-meta {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
    }

    .item-amount {
      font-size: 15px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.overdue {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.completed {
      background: #e5e7eb;
      color: #374151;
    }

    .badge.inactive {
      background: #f3f4f6;
      color: #6b7280;
    }

    .item-actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 8px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    .button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .button.disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .small-button {
      border: none;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: bold;
      background: #e5e7eb;
      color: #111827;
      cursor: pointer;
    }

    .empty-card {
      background: white;
      border-radius: 18px;
      padding: 24px 18px;
      text-align: center;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .empty-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .empty-text {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 18px 0 12px;
    }

    .note-card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .note {
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
      margin: 0;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: white;
      border-top: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px 6px;
    }

    .nav-item {
      border: none;
      background: none;
      padding: 8px 4px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
    }

    .nav-item.active {
      color: #111827;
      font-weight: bold;
    }

    .nav-icon {
      display: block;
      font-size: 20px;
      margin-bottom: 3px;
    }

    @media (max-width: 390px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        padding-left: 12px;
        padding-right: 12px;
      }

      .item-name {
        font-size: 14px;
      }

      .item-amount {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <h1>Money Manager</h1>
      <p id="pageSubtitle">This month’s planned money items</p>

      <div class="month-switcher">
        <button class="month-button" onclick="changeMonth(-1)">‹</button>
        <button id="monthLabel" class="month-label" onclick="alert('Month picker will come later')">
          May 2026
        </button>
        <button class="month-button" onclick="changeMonth(1)">›</button>
      </div>
    </header>

    <main id="dashboardPage" class="page active">
      <div id="dashboardContent"></div>
    </main>

    <main id="incomePage" class="page">
      <div class="section-title">Income</div>
      <div id="incomeContent"></div>
    </main>

    <main id="expensesPage" class="page">
      <div class="section-title">Expenses</div>
      <div id="expensesContent"></div>
    </main>

    <main id="savingsPage" class="page">
      <div class="section-title">Savings & Investments</div>
      <div id="savingsContent"></div>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" onclick="showPage('dashboard', this)">
        <span class="nav-icon">🏠</span>
        Dashboard
      </button>

      <button class="nav-item" onclick="showPage('income', this)">
        <span class="nav-icon">💰</span>
        Income
      </button>

      <button class="nav-item" onclick="showPage('expenses', this)">
        <span class="nav-icon">🧾</span>
        Expenses
      </button>

      <button class="nav-item" onclick="showPage('savings', this)">
        <span class="nav-icon">🏦</span>
        Savings
      </button>
    </nav>
  </div>

  <script>
    const STORAGE_KEY = 'money-manager-monthly-blocks-v2';

    const today = new Date();
    let selectedYear = 2026;
    let selectedMonth = 4;
    let viewFilter = 'all';

    const defaultData = {
      '2026-05': [
        {
          id: 1,
          title: 'Income',
          type: 'income',
          order: 1,
          items: [
            {
              id: 101,
              name: 'Rental Income',
              expected: 800,
              actual: 800,
              day: 1,
              completed: true,
              order: 1
            },
            {
              id: 102,
              name: 'Salary',
              expected: 4500,
              actual: 0,
              day: 25,
              completed: false,
              order: 2
            },
            {
              id: 103,
              name: 'Bonus',
              expected: '',
              actual: 0,
              day: 30,
              completed: false,
              order: 3
            }
          ]
        },
        {
          id: 2,
          title: 'Expenses / Family',
          type: 'expense',
          order: 2,
          items: [
            {
              id: 201,
              name: 'Parents Allowance',
              expected: 1000,
              actual: 1000,
              day: 5,
              completed: true,
              order: 1
            },
            {
              id: 202,
              name: 'Family Meal',
              expected: 300,
              actual: 0,
              day: 15,
              completed: false,
              order: 2
            }
          ]
        },
        {
          id: 3,
          title: 'Expenses / Personal',
          type: 'expense',
          order: 3,
          items: [
            {
              id: 301,
              name: 'Food',
              expected: 900,
              actual: 0,
              day: 30,
              completed: false,
              order: 1
            },
            {
              id: 302,
              name: 'Transport',
              expected: 500,
              actual: 500,
              day: 30,
              completed: true,
              order: 2
            },
            {
              id: 303,
              name: 'Shopping',
              expected: '',
              actual: 0,
              day: 30,
              completed: false,
              order: 3
            }
          ]
        },
        {
          id: 4,
          title: 'Expenses / Properties',
          type: 'expense',
          order: 4,
          items: [
            {
              id: 401,
              name: 'Internet Bill',
              expected: 200,
              actual: 0,
              day: 10,
              completed: false,
              order: 1
            },
            {
              id: 402,
              name: 'Maintenance Fee',
              expected: 250,
              actual: 0,
              day: 20,
              completed: false,
              order: 2
            }
          ]
        },
        {
          id: 5,
          title: 'Savings',
          type: 'savings',
          order: 5,
          items: [
            {
              id: 501,
              name: 'Emergency Fund',
              expected: 500,
              actual: 500,
              day: 30,
              completed: true,
              order: 1
            },
            {
              id: 502,
              name: 'Travel Fund',
              expected: '',
              actual: 0,
              day: 30,
              completed: false,
              order: 2
            }
          ]
        },
        {
          id: 6,
          title: 'Investments',
          type: 'investment',
          order: 6,
          items: [
            {
              id: 601,
              name: 'Investment Cash',
              expected: 600,
              actual: 0,
              day: 30,
              completed: false,
              order: 1
            }
          ]
        }
      ]
    };

    let monthData = loadData();

    function loadData() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        return defaultData;
      }

      try {
        return JSON.parse(saved);
      } catch (error) {
        return defaultData;
      }
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(monthData));
    }

    function getMonthKey() {
      const monthNumber = String(selectedMonth + 1).padStart(2, '0');
      return selectedYear + '-' + monthNumber;
    }

    function getMonthName() {
      return new Date(selectedYear, selectedMonth, 1).toLocaleString('en-MY', {
        month: 'long',
        year: 'numeric'
      });
    }

    function getBlocks() {
      return monthData[getMonthKey()] || [];
    }

    function setBlocks(blocks) {
      monthData[getMonthKey()] = blocks;
      saveData();
    }

    function hasExpectedValue(item) {
      return item.expected !== '' && item.expected !== null && item.expected !== undefined && Number(item.expected) > 0;
    }

    function isPending(item) {
      return hasExpectedValue(item) && !item.completed;
    }

    function formatMoney(amount) {
      if (amount === '' || amount === null || amount === undefined) {
        return '—';
      }

      return 'RM ' + Number(amount || 0).toLocaleString('en-MY', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function getDateLabel(day) {
      return day + ' ' + new Date(selectedYear, selectedMonth, day).toLocaleString('en-MY', {
        month: 'short'
      });
    }

    function getCurrentDayForSelectedMonth() {
      const isCurrentMonth =
        selectedYear === today.getFullYear() &&
        selectedMonth === today.getMonth();

      if (!isCurrentMonth) {
        return 999;
      }

      return today.getDate();
    }

    function isOverdue(item) {
      if (!isPending(item)) {
        return false;
      }

      return item.day < getCurrentDayForSelectedMonth();
    }

    function getActionLabel(type) {
      if (type === 'income') return 'Mark Received';
      if (type === 'expense') return 'Mark Paid';
      if (type === 'savings') return 'Mark Saved';
      if (type === 'investment') return 'Mark Invested';
      return 'Mark Done';
    }

    function getDoneLabel(type) {
      if (type === 'income') return 'Received';
      if (type === 'expense') return 'Paid';
      if (type === 'savings') return 'Saved';
      if (type === 'investment') return 'Invested';
      return 'Done';
    }

    function getPendingLabel(type) {
      if (type === 'income') return 'Not received';
      if (type === 'expense') return 'Not paid';
      if (type === 'savings') return 'Not saved';
      if (type === 'investment') return 'Not invested';
      return 'Pending';
    }

    function getStatusLabel(block, item) {
      if (!hasExpectedValue(item)) {
        return 'Not expected';
      }

      if (item.completed) {
        return getDoneLabel(block.type);
      }

      if (isOverdue(item)) {
        return 'Overdue';
      }

      return getPendingLabel(block.type);
    }

    function flattenItems(blocks) {
      return blocks.flatMap(function (block) {
        return block.items.map(function (item) {
          return {
            blockType: block.type,
            blockTitle: block.title,
            ...item
          };
        });
      });
    }

    function markCompleted(blockId, itemId) {
      const blocks = getBlocks().map(function (block) {
        if (block.id !== blockId) {
          return block;
        }

        return {
          ...block,
          items: block.items.map(function (item) {
            if (item.id !== itemId) {
              return item;
            }

            if (!hasExpectedValue(item)) {
              return item;
            }

            return {
              ...item,
              actual: Number(item.expected),
              completed: true
            };
          })
        };
      });

      setBlocks(blocks);
      renderApp();
    }

    function undoCompleted(blockId, itemId) {
      const blocks = getBlocks().map(function (block) {
        if (block.id !== blockId) {
          return block;
        }

        return {
          ...block,
          items: block.items.map(function (item) {
            if (item.id !== itemId) {
              return item;
            }

            return {
              ...item,
              actual: 0,
              completed: false
            };
          })
        };
      });

      setBlocks(blocks);
      renderApp();
    }

    function copyPreviousMonth() {
      const currentKey = getMonthKey();

      const previousDate = new Date(selectedYear, selectedMonth - 1, 1);
      const previousYear = previousDate.getFullYear();
      const previousMonth = previousDate.getMonth();
      const previousKey = previousYear + '-' + String(previousMonth + 1).padStart(2, '0');

      const previousBlocks = monthData[previousKey] || [];

      if (previousBlocks.length === 0) {
        alert('Previous month has no blocks to copy.');
        return;
      }

      const copiedBlocks = previousBlocks.map(function (block, blockIndex) {
        return {
          ...block,
          id: Date.now() + blockIndex,
          items: block.items.map(function (item, itemIndex) {
            return {
              ...item,
              id: Date.now() + blockIndex * 100 + itemIndex,
              actual: 0,
              completed: false
            };
          })
        };
      });

      monthData[currentKey] = copiedBlocks;
      saveData();
      renderApp();
    }

    function startEmptyMonth() {
      monthData[getMonthKey()] = [];
      saveData();
      renderApp();
    }

    function setViewFilter(filter) {
      viewFilter = filter;
      renderApp();
    }

    function renderMonthLabel() {
      document.getElementById('monthLabel').textContent = getMonthName();
    }

    function renderFilterToggle() {
      return `
        <div class="filter-toggle">
          <button class="filter-button ${viewFilter === 'all' ? 'active' : ''}" onclick="setViewFilter('all')">
            All Items
          </button>

          <button class="filter-button ${viewFilter === 'pending' ? 'active' : ''}" onclick="setViewFilter('pending')">
            Pending Only
          </button>
        </div>
      `;
    }

    function renderEmptyMonth() {
      return `
        <div class="empty-card">
          <div class="empty-title">No records for ${getMonthName()}</div>
          <div class="empty-text">
            This month is empty until you create it. Copy the previous month as a fresh skeleton, or start empty.
          </div>

          <button class="button" onclick="copyPreviousMonth()">Copy Previous Month</button>
          <br><br>
          <button class="button secondary" onclick="startEmptyMonth()">Start Empty</button>
        </div>
      `;
    }

    function countPendingByType(blocks, type) {
      return blocks
        .filter(function (block) {
          return block.type === type;
        })
        .reduce(function (sum, block) {
          return sum + block.items.filter(isPending).length;
        }, 0);
    }

    function renderPendingSummary(blocks) {
      const incomePending = countPendingByType(blocks, 'income');
      const expensePending = countPendingByType(blocks, 'expense');
      const savingsPending = countPendingByType(blocks, 'savings');
      const investmentPending = countPendingByType(blocks, 'investment');

      return `
        <div class="pending-grid">
          <div class="pending-card">
            <div class="pending-label">Income</div>
            <div class="pending-value">${incomePending}</div>
            <div class="pending-sub">pending</div>
          </div>

          <div class="pending-card">
            <div class="pending-label">Expenses</div>
            <div class="pending-value">${expensePending}</div>
            <div class="pending-sub">pending</div>
          </div>

          <div class="pending-card">
            <div class="pending-label">Savings</div>
            <div class="pending-value">${savingsPending}</div>
            <div class="pending-sub">pending</div>
          </div>

          <div class="pending-card">
            <div class="pending-label">Investments</div>
            <div class="pending-value">${investmentPending}</div>
            <div class="pending-sub">pending</div>
          </div>
        </div>
      `;
    }

    function renderBlock(block) {
      let items = [...block.items].sort(function (a, b) {
        return a.order - b.order;
      });

      if (viewFilter === 'pending') {
        items = items.filter(isPending);
      }

      if (items.length === 0 && viewFilter === 'pending') {
        return '';
      }

      const activeItems = block.items.filter(hasExpectedValue);

      const expectedTotal = activeItems.reduce(function (sum, item) {
        return sum + Number(item.expected || 0);
      }, 0);

      const actualTotal = activeItems.reduce(function (sum, item) {
        return sum + Number(item.actual || 0);
      }, 0);

      const pendingCount = activeItems.filter(isPending).length;

      return `
        <section class="block ${block.type}">
          <div class="block-header">
            <div>
              <div class="block-title">${block.title}</div>
              <div class="block-sub">${pendingCount} pending · ${activeItems.length} expected item(s)</div>
            </div>

            <div class="block-total">
              ${formatMoney(actualTotal)}
              <div class="block-total-sub">of ${formatMoney(expectedTotal)}</div>
            </div>
          </div>

          ${items.map(function (item) {
            return renderItem(block, item);
          }).join('')}
        </section>
      `;
    }

    function renderItem(block, item) {
      const status = getStatusLabel(block, item);
      const inactive = !hasExpectedValue(item);
      const badgeClass = inactive ? 'inactive' : (item.completed ? 'completed' : (isOverdue(item) ? 'overdue' : 'pending'));

      return `
        <div class="item ${item.completed ? 'completed' : ''} ${inactive ? 'inactive' : ''}">
          <div class="item-top">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-meta">
                ${block.title} · ${getDateLabel(item.day)}
              </div>
              <span class="badge ${badgeClass}">${status}</span>
            </div>

            <div class="item-amount">
              ${formatMoney(item.expected)}
              <div class="item-meta">
                ${
                  inactive
                    ? 'No expected amount'
                    : item.completed
                      ? formatMoney(item.actual) + ' done'
                      : 'Expected'
                }
              </div>
            </div>
          </div>

          <div class="item-actions">
            ${
              inactive
                ? `<button class="button disabled" disabled>Not Expected</button>`
                : item.completed
                  ? `<button class="button secondary" onclick="undoCompleted(${block.id}, ${item.id})">Undo ${getDoneLabel(block.type)}</button>`
                  : `<button class="button" onclick="markCompleted(${block.id}, ${item.id})">${getActionLabel(block.type)}</button>`
            }

            <button class="small-button" onclick="alert('Edit will come later')">Edit</button>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const blocks = [...getBlocks()].sort(function (a, b) {
        return a.order - b.order;
      });

      const container = document.getElementById('dashboardContent');

      if (blocks.length === 0) {
        container.innerHTML = renderEmptyMonth();
        return;
      }

      const blockHtml = blocks.map(renderBlock).join('');

      container.innerHTML = `
        ${renderPendingSummary(blocks)}
        ${renderFilterToggle()}
        ${blockHtml || '<div class="empty-card"><div class="empty-title">No pending items</div><div class="empty-text">Everything expected for this month has been completed.</div></div>'}
      `;
    }

    function renderSectionPage(type, containerId) {
      const blocks = [...getBlocks()]
        .filter(function (block) {
          if (type === 'savings') {
            return block.type === 'savings' || block.type === 'investment';
          }

          return block.type === type;
        })
        .sort(function (a, b) {
          return a.order - b.order;
        });

      const container = document.getElementById(containerId);

      if (getBlocks().length === 0) {
        container.innerHTML = renderEmptyMonth();
        return;
      }

      if (blocks.length === 0) {
        container.innerHTML = `
          <div class="empty-card">
            <div class="empty-title">No items here yet</div>
            <div class="empty-text">This section has no blocks for ${getMonthName()}.</div>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        ${blocks.map(renderBlock).join('')}

        <div class="note-card">
          <p class="note">
            Items with empty expected value are treated as not expected this month, so they are ignored from pending counts.
          </p>
        </div>
      `;
    }

    function renderApp() {
      renderMonthLabel();
      renderDashboard();
      renderSectionPage('income', 'incomeContent');
      renderSectionPage('expense', 'expensesContent');
      renderSectionPage('savings', 'savingsContent');
    }

    function changeMonth(direction) {
      const newDate = new Date(selectedYear, selectedMonth + direction, 1);

      selectedYear = newDate.getFullYear();
      selectedMonth = newDate.getMonth();

      renderApp();
    }

    function showPage(pageName, button) {
      const pages = document.querySelectorAll('.page');
      const navItems = document.querySelectorAll('.nav-item');
      const subtitle = document.getElementById('pageSubtitle');

      pages.forEach(function (page) {
        page.classList.remove('active');
      });

      navItems.forEach(function (item) {
        item.classList.remove('active');
      });

      document.getElementById(pageName + 'Page').classList.add('active');
      button.classList.add('active');

      if (pageName === 'dashboard') {
        subtitle.textContent = 'This month’s planned money items';
      }

      if (pageName === 'income') {
        subtitle.textContent = 'Income blocks for the selected month';
      }

      if (pageName === 'expenses') {
        subtitle.textContent = 'Expense blocks for the selected month';
      }

      if (pageName === 'savings') {
        subtitle.textContent = 'Savings and investment blocks for the selected month';
      }
    }

    renderApp();
  </script>
</body>
</html>
