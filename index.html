<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Money Manager</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f4f6f8;
      padding-bottom: 86px;
    }

    .header {
      padding: 18px 18px 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 25px;
    }

    .header p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.4;
    }

    .month-switcher {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      gap: 10px;
      align-items: center;
    }

    .month-button {
      border: none;
      border-radius: 14px;
      background: white;
      height: 44px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      cursor: pointer;
    }

    .month-label {
      border: none;
      border-radius: 14px;
      background: white;
      height: 44px;
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 10px 18px;
    }

    .page.active {
      display: block;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 18px 0 12px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    .summary-label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 20px;
      font-weight: bold;
    }

    .summary-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 5px;
    }

    .sort-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    .sort-button {
      border: none;
      border-radius: 14px;
      padding: 12px;
      background: #e5e7eb;
      color: #374151;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .sort-button.active {
      background: #111827;
      color: white;
    }

    .item-card {
      background: white;
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
      border-left: 5px solid #d1d5db;
    }

    .item-card.income {
      border-left-color: #047857;
    }

    .item-card.expense {
      border-left-color: #b45309;
    }

    .item-card.savings {
      border-left-color: #2563eb;
    }

    .item-card.completed {
      opacity: 0.68;
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .item-meta {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
    }

    .item-amount {
      font-size: 15px;
      font-weight: bold;
      text-align: right;
      white-space: nowrap;
    }

    .badge {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.income {
      background: #d1fae5;
      color: #047857;
    }

    .badge.expense {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.savings {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .badge.overdue {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.completed {
      background: #e5e7eb;
      color: #374151;
    }

    .item-actions {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 8px;
    }

    .button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px;
      font-size: 15px;
      font-weight: bold;
      background: #111827;
      color: white;
      cursor: pointer;
    }

    .button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .button.danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .small-button {
      border: none;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 13px;
      font-weight: bold;
      background: #e5e7eb;
      color: #111827;
      cursor: pointer;
    }

    .section-table {
      padding: 0;
      overflow: hidden;
    }

    .table-header {
      display: grid;
      grid-template-columns: 1.25fr 0.8fr 0.8fr 0.7fr;
      gap: 6px;
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
      font-size: 11px;
      font-weight: bold;
      color: #6b7280;
      text-transform: uppercase;
    }

    .table-row {
      display: grid;
      grid-template-columns: 1.25fr 0.8fr 0.8fr 0.7fr;
      gap: 6px;
      padding: 13px 14px;
      border-bottom: 1px solid #eef0f2;
      align-items: center;
    }

    .table-row:last-child {
      border-bottom: none;
    }

    .row-name {
      font-size: 14px;
      font-weight: bold;
    }

    .row-sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 3px;
    }

    .money {
      text-align: right;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .status-text {
      text-align: right;
      font-size: 12px;
      font-weight: bold;
    }

    .completed-text {
      color: #047857;
    }

    .pending-text {
      color: #b45309;
    }

    .overdue-text {
      color: #b91c1c;
    }

    .empty-state {
      text-align: center;
      padding: 28px 18px;
    }

    .empty-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .empty-text {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .note {
      font-size: 13px;
      line-height: 1.5;
      color: #6b7280;
      margin: 0;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: white;
      border-top: 1px solid #e5e7eb;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 8px 6px;
    }

    .nav-item {
      border: none;
      background: none;
      padding: 8px 4px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
    }

    .nav-item.active {
      color: #111827;
      font-weight: bold;
    }

    .nav-icon {
      display: block;
      font-size: 20px;
      margin-bottom: 3px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 390px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header {
        padding-left: 12px;
        padding-right: 12px;
      }

      .table-header,
      .table-row {
        grid-template-columns: 1.2fr 0.8fr 0.8fr 0.7fr;
        padding-left: 10px;
        padding-right: 10px;
      }

      .money,
      .status-text {
        font-size: 11px;
      }

      .row-name {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="header">
      <h1>Money Manager</h1>
      <p id="pageSubtitle">This month’s checklist</p>

      <div class="month-switcher">
        <button class="month-button" onclick="changeMonth(-1)">‹</button>
        <button id="monthLabel" class="month-label" onclick="alert('Month picker will come later')">
          May 2026
        </button>
        <button class="month-button" onclick="changeMonth(1)">›</button>
      </div>
    </header>

    <!-- Dashboard -->
    <main id="dashboardPage" class="page active">
      <div id="dashboardContent"></div>
    </main>

    <!-- Income -->
    <main id="incomePage" class="page">
      <div class="section-title">Income</div>
      <div id="incomeContent"></div>
    </main>

    <!-- Expenses -->
    <main id="expensesPage" class="page">
      <div class="section-title">Expenses</div>
      <div id="expensesContent"></div>
    </main>

    <!-- Savings -->
    <main id="savingsPage" class="page">
      <div class="section-title">Savings</div>
      <div id="savingsContent"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="showPage('dashboard', this)">
        <span class="nav-icon">🏠</span>
        Dashboard
      </button>

      <button class="nav-item" onclick="showPage('income', this)">
        <span class="nav-icon">💰</span>
        Income
      </button>

      <button class="nav-item" onclick="showPage('expenses', this)">
        <span class="nav-icon">🧾</span>
        Expenses
      </button>

      <button class="nav-item" onclick="showPage('savings', this)">
        <span class="nav-icon">🏦</span>
        Savings
      </button>
    </nav>
  </div>

  <script>
    const today = new Date();
    let selectedYear = 2026;
    let selectedMonth = 4; // May. JavaScript month starts from 0.
    let sortMode = 'pending';

    const monthData = {
      '2026-05': [
        {
          id: 1,
          type: 'income',
          name: 'Rental Income',
          expected: 800,
          actual: 800,
          day: 1,
          completed: true,
          order: 1
        },
        {
          id: 2,
          type: 'income',
          name: 'Salary',
          expected: 4500,
          actual: 0,
          day: 25,
          completed: false,
          order: 2
        },
        {
          id: 3,
          type: 'expense',
          name: 'Car Loan',
          expected: 900,
          actual: 900,
          day: 5,
          completed: true,
          order: 3
        },
        {
          id: 4,
          type: 'expense',
          name: 'Internet Bill',
          expected: 200,
          actual: 0,
          day: 10,
          completed: false,
          order: 4
        },
        {
          id: 5,
          type: 'expense',
          name: 'Insurance',
          expected: 250,
          actual: 0,
          day: 20,
          completed: false,
          order: 5
        },
        {
          id: 6,
          type: 'savings',
          name: 'Emergency Fund',
          expected: 500,
          actual: 500,
          day: 30,
          completed: true,
          order: 6
        },
        {
          id: 7,
          type: 'savings',
          name: 'Investment Cash',
          expected: 600,
          actual: 0,
          day: 30,
          completed: false,
          order: 7
        }
      ]
    };

    function getMonthKey() {
      const monthNumber = String(selectedMonth + 1).padStart(2, '0');
      return selectedYear + '-' + monthNumber;
    }

    function getMonthName() {
      return new Date(selectedYear, selectedMonth, 1).toLocaleString('en-MY', {
        month: 'long',
        year: 'numeric'
      });
    }

    function getItems() {
      return monthData[getMonthKey()] || [];
    }

    function saveItems(items) {
      monthData[getMonthKey()] = items;
    }

    function formatMoney(amount) {
      return 'RM ' + Number(amount || 0).toLocaleString('en-MY', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function getTypeLabel(type) {
      if (type === 'income') return 'Income';
      if (type === 'expense') return 'Expense';
      if (type === 'savings') return 'Savings';
      return type;
    }

    function getActionLabel(type) {
      if (type === 'income') return 'Mark Received';
      if (type === 'expense') return 'Mark Paid';
      if (type === 'savings') return 'Mark Saved';
      return 'Mark Done';
    }

    function getCompletedLabel(type) {
      if (type === 'income') return 'Received';
      if (type === 'expense') return 'Paid';
      if (type === 'savings') return 'Saved';
      return 'Done';
    }

    function getPendingLabel(type) {
      if (type === 'income') return 'Not received';
      if (type === 'expense') return 'Not paid';
      if (type === 'savings') return 'Not saved';
      return 'Pending';
    }

    function getDateLabel(day) {
      return day + ' ' + new Date(selectedYear, selectedMonth, day).toLocaleString('en-MY', {
        month: 'short'
      });
    }

    function getTodayDayForSelectedMonth() {
      const isCurrentMonth =
        selectedYear === today.getFullYear() &&
        selectedMonth === today.getMonth();

      if (!isCurrentMonth) {
        return 999;
      }

      return today.getDate();
    }

    function isOverdue(item) {
      if (item.completed) return false;
      return item.day < getTodayDayForSelectedMonth();
    }

    function getStatusLabel(item) {
      if (item.completed) return getCompletedLabel(item.type);
      if (isOverdue(item)) return 'Overdue';
      return getPendingLabel(item.type);
    }

    function getStatusClass(item) {
      if (item.completed) return 'completed-text';
      if (isOverdue(item)) return 'overdue-text';
      return 'pending-text';
    }

    function sortItems(items) {
      const copied = [...items];

      if (sortMode === 'manual') {
        return copied.sort(function (a, b) {
          return a.order - b.order;
        });
      }

      return copied.sort(function (a, b) {
        const aOverdue = isOverdue(a) ? 0 : 1;
        const bOverdue = isOverdue(b) ? 0 : 1;

        if (a.completed !== b.completed) {
          return a.completed ? 1 : -1;
        }

        if (aOverdue !== bOverdue) {
          return aOverdue - bOverdue;
        }

        return a.day - b.day;
      });
    }

    function markCompleted(itemId) {
      const items = getItems();

      const updated = items.map(function (item) {
        if (item.id !== itemId) {
          return item;
        }

        return {
          ...item,
          actual: item.expected,
          completed: true
        };
      });

      saveItems(updated);
      renderApp();
    }

    function undoCompleted(itemId) {
      const items = getItems();

      const updated = items.map(function (item) {
        if (item.id !== itemId) {
          return item;
        }

        return {
          ...item,
          actual: 0,
          completed: false
        };
      });

      saveItems(updated);
      renderApp();
    }

    function copyPreviousMonth() {
      const currentKey = getMonthKey();

      const previousDate = new Date(selectedYear, selectedMonth - 1, 1);
      const previousYear = previousDate.getFullYear();
      const previousMonth = previousDate.getMonth();
      const previousKey = previousYear + '-' + String(previousMonth + 1).padStart(2, '0');

      const previousItems = monthData[previousKey] || [];

      if (previousItems.length === 0) {
        alert('Previous month has no items to copy.');
        return;
      }

      const copiedItems = previousItems.map(function (item, index) {
        return {
          ...item,
          id: Date.now() + index,
          actual: 0,
          completed: false
        };
      });

      monthData[currentKey] = copiedItems;
      renderApp();
    }

    function startEmptyMonth() {
      monthData[getMonthKey()] = [];
      renderApp();
    }

    function renderMonthLabel() {
      document.getElementById('monthLabel').textContent = getMonthName();
    }

    function renderEmptyMonth() {
      return `
        <div class="card empty-state">
          <div class="empty-title">No records for ${getMonthName()}</div>
          <div class="empty-text">
            This month is empty until you create it. You can copy the previous month as a fresh skeleton, or start empty.
          </div>

          <button class="button" onclick="copyPreviousMonth()">
            Copy Previous Month
          </button>

          <button class="button secondary" onclick="startEmptyMonth()">
            Start Empty
          </button>
        </div>
      `;
    }

    function renderSummary(items) {
      const expectedIncome = items
        .filter(item => item.type === 'income')
        .reduce((sum, item) => sum + item.expected, 0);

      const actualIncome = items
        .filter(item => item.type === 'income')
        .reduce((sum, item) => sum + item.actual, 0);

      const expectedExpenses = items
        .filter(item => item.type === 'expense')
        .reduce((sum, item) => sum + item.expected, 0);

      const actualExpenses = items
        .filter(item => item.type === 'expense')
        .reduce((sum, item) => sum + item.actual, 0);

      const expectedSavings = items
        .filter(item => item.type === 'savings')
        .reduce((sum, item) => sum + item.expected, 0);

      const actualSavings = items
        .filter(item => item.type === 'savings')
        .reduce((sum, item) => sum + item.actual, 0);

      return `
        <div class="summary-grid">
          <div class="summary-card">
            <div class="summary-label">Income</div>
            <div class="summary-value">${formatMoney(actualIncome)}</div>
            <div class="summary-sub">of ${formatMoney(expectedIncome)} received</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">Expenses</div>
            <div class="summary-value">${formatMoney(actualExpenses)}</div>
            <div class="summary-sub">of ${formatMoney(expectedExpenses)} paid</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">Savings</div>
            <div class="summary-value">${formatMoney(actualSavings)}</div>
            <div class="summary-sub">of ${formatMoney(expectedSavings)} saved</div>
          </div>

          <div class="summary-card">
            <div class="summary-label">Pending</div>
            <div class="summary-value">${items.filter(item => !item.completed).length}</div>
            <div class="summary-sub">not happened yet</div>
          </div>
        </div>
      `;
    }

    function renderSortToggle() {
      return `
        <div class="sort-toggle">
          <button class="sort-button ${sortMode === 'manual' ? 'active' : ''}" onclick="setSortMode('manual')">
            Manual Order
          </button>

          <button class="sort-button ${sortMode === 'pending' ? 'active' : ''}" onclick="setSortMode('pending')">
            Pending First
          </button>
        </div>
      `;
    }

    function renderItemCard(item) {
      const status = getStatusLabel(item);
      const statusBadgeClass = item.completed ? 'completed' : (isOverdue(item) ? 'overdue' : item.type);

      return `
        <div class="item-card ${item.type} ${item.completed ? 'completed' : ''}">
          <div class="item-top">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-meta">
                ${getTypeLabel(item.type)} · ${getDateLabel(item.day)}
              </div>
              <span class="badge ${statusBadgeClass}">${status}</span>
            </div>

            <div class="item-amount">
              ${formatMoney(item.expected)}
              <div class="item-meta">${item.completed ? formatMoney(item.actual) + ' done' : 'Expected'}</div>
            </div>
          </div>

          <div class="item-actions">
            ${
              item.completed
                ? `<button class="button secondary" onclick="undoCompleted(${item.id})">Undo ${getCompletedLabel(item.type)}</button>`
                : `<button class="button" onclick="markCompleted(${item.id})">${getActionLabel(item.type)}</button>`
            }

            <button class="small-button" onclick="alert('Edit will come later')">Edit</button>
          </div>
        </div>
      `;
    }

    function renderDashboard() {
      const items = getItems();
      const dashboardContent = document.getElementById('dashboardContent');

      if (items.length === 0) {
        dashboardContent.innerHTML = renderEmptyMonth();
        return;
      }

      const sorted = sortItems(items);

      dashboardContent.innerHTML = `
        ${renderSummary(items)}

        <div class="section-title">This Month Checklist</div>

        ${renderSortToggle()}

        ${sorted.map(renderItemCard).join('')}
      `;
    }

    function renderSection(type, elementId) {
      const items = getItems().filter(function (item) {
        return item.type === type;
      });

      const container = document.getElementById(elementId);

      if (getItems().length === 0) {
        container.innerHTML = renderEmptyMonth();
        return;
      }

      if (items.length === 0) {
        container.innerHTML = `
          <div class="card empty-state">
            <div class="empty-title">No ${getTypeLabel(type).toLowerCase()} items yet</div>
            <div class="empty-text">
              This section has no items for ${getMonthName()}.
            </div>
            <button class="button" onclick="alert('Add item will come later')">Add Item</button>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="card section-table">
          <div class="table-header">
            <div>Item</div>
            <div class="money">Expected</div>
            <div class="money">Actual</div>
            <div class="status-text">Status</div>
          </div>

          ${items.sort((a, b) => a.order - b.order).map(function (item) {
            return `
              <div class="table-row">
                <div>
                  <div class="row-name">${item.name}</div>
                  <div class="row-sub">${getDateLabel(item.day)}</div>
                </div>
                <div class="money">${formatMoney(item.expected)}</div>
                <div class="money">${formatMoney(item.actual)}</div>
                <div class="status-text ${getStatusClass(item)}">${getStatusLabel(item)}</div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="card">
          <p class="note">
            This page is for reviewing ${getTypeLabel(type).toLowerCase()} items for ${getMonthName()}. Editing and adding items will come next.
          </p>
        </div>
      `;
    }

    function renderApp() {
      renderMonthLabel();
      renderDashboard();
      renderSection('income', 'incomeContent');
      renderSection('expense', 'expensesContent');
      renderSection('savings', 'savingsContent');
    }

    function setSortMode(mode) {
      sortMode = mode;
      renderDashboard();
    }

    function changeMonth(direction) {
      const newDate = new Date(selectedYear, selectedMonth + direction, 1);

      selectedYear = newDate.getFullYear();
      selectedMonth = newDate.getMonth();

      renderApp();
    }

    function showPage(pageName, button) {
      const pages = document.querySelectorAll('.page');
      const navItems = document.querySelectorAll('.nav-item');
      const subtitle = document.getElementById('pageSubtitle');

      pages.forEach(function (page) {
        page.classList.remove('active');
      });

      navItems.forEach(function (item) {
        item.classList.remove('active');
      });

      document.getElementById(pageName + 'Page').classList.add('active');
      button.classList.add('active');

      if (pageName === 'dashboard') {
        subtitle.textContent = 'This month’s checklist';
      }

      if (pageName === 'income') {
        subtitle.textContent = 'Expected income and received income';
      }

      if (pageName === 'expenses') {
        subtitle.textContent = 'Expected expenses and paid expenses';
      }

      if (pageName === 'savings') {
        subtitle.textContent = 'Expected savings and saved amount';
      }
    }

    renderApp();
  </script>
</body>
</html>
